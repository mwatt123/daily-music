<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560">
  <defs>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- daily-palette spectrum -->
  <rect width="280" height="560" x="0"    fill="#e94f37"/>
  <rect width="280" height="560" x="280"  fill="#f0a831"/>
  <rect width="280" height="560" x="560"  fill="#1f9e8b"/>
  <rect width="280" height="560" x="840"  fill="#3d5a98"/>
  <rect width="280" height="560" x="1120" fill="#c14b8a"/>

  <!-- three daily picks, each a distinct sleeve + label; hero in the centre -->
  <!-- left: magenta sleeve, teal label -->
  <g transform="translate(250 165) scale(0.88)">
    <rect width="230" height="300" rx="20" fill="#faf7f1" filter="url(#sh)"/>
    <rect x="20" y="20" width="190" height="190" rx="12" fill="#c14b8a"/>
    <g transform="translate(115 115)">
      <circle r="80" fill="#141414"/>
      <g fill="none" stroke="#3d3a38" stroke-width="2.4"><circle r="68"/><circle r="54"/><circle r="40"/></g>
      <path d="M -46 -52 A 70 70 0 0 1 52 -46" fill="none" stroke="#fff" stroke-opacity="0.16" stroke-width="6" stroke-linecap="round"/>
      <circle r="27" fill="#1f9e8b"/><circle r="6" fill="#141414"/>
    </g>
    <rect x="20" y="234" width="150" height="17" rx="8.5" fill="#2a2a2a"/>
    <rect x="20" y="262" width="96"  height="14" rx="7"   fill="#b3aca2"/>
  </g>
  <!-- right: teal sleeve, magenta label -->
  <g transform="translate(950 165) scale(0.88)">
    <rect width="230" height="300" rx="20" fill="#faf7f1" filter="url(#sh)"/>
    <rect x="20" y="20" width="190" height="190" rx="12" fill="#1f9e8b"/>
    <g transform="translate(115 115)">
      <circle r="80" fill="#141414"/>
      <g fill="none" stroke="#3d3a38" stroke-width="2.4"><circle r="68"/><circle r="54"/><circle r="40"/></g>
      <path d="M -46 -52 A 70 70 0 0 1 52 -46" fill="none" stroke="#fff" stroke-opacity="0.16" stroke-width="6" stroke-linecap="round"/>
      <circle r="27" fill="#c14b8a"/><circle r="6" fill="#141414"/>
    </g>
    <rect x="20" y="234" width="150" height="17" rx="8.5" fill="#2a2a2a"/>
    <rect x="20" y="262" width="96"  height="14" rx="7"   fill="#b3aca2"/>
  </g>
  <!-- centre hero: orange sleeve, gold label -->
  <g transform="translate(555 120) scale(1.02)">
    <rect width="230" height="300" rx="20" fill="#faf7f1" filter="url(#sh)"/>
    <rect x="20" y="20" width="190" height="190" rx="12" fill="#e94f37"/>
    <g transform="translate(115 115)">
      <circle r="80" fill="#141414"/>
      <g fill="none" stroke="#3d3a38" stroke-width="2.4"><circle r="68"/><circle r="54"/><circle r="40"/></g>
      <path d="M -46 -52 A 70 70 0 0 1 52 -46" fill="none" stroke="#fff" stroke-opacity="0.16" stroke-width="6" stroke-linecap="round"/>
      <circle r="27" fill="#f0a831"/><circle r="6" fill="#141414"/>
    </g>
    <rect x="20" y="234" width="150" height="17" rx="8.5" fill="#2a2a2a"/>
    <rect x="20" y="262" width="96"  height="14" rx="7"   fill="#b3aca2"/>
  </g>
</svg>
