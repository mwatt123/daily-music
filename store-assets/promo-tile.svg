<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <defs>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#000" flood-opacity="0.30"/>
    </filter>
    <clipPath id="cov"><rect x="159" y="54" width="122" height="122" rx="9"/></clipPath>
  </defs>

  <!-- daily-palette spectrum: the page takes on each cover's colors -->
  <rect width="88" height="280" x="0"   fill="#e94f37"/>
  <rect width="88" height="280" x="88"  fill="#f0a831"/>
  <rect width="88" height="280" x="176" fill="#1f9e8b"/>
  <rect width="88" height="280" x="264" fill="#3d5a98"/>
  <rect width="88" height="280" x="352" fill="#c14b8a"/>

  <!-- today's pick: a floating cover card with a vinyl -->
  <rect x="145" y="40" width="150" height="200" rx="16" fill="#faf7f1" filter="url(#sh)"/>
  <g clip-path="url(#cov)">
    <rect x="159" y="54" width="122" height="122" fill="#e94f37"/>
    <g transform="translate(220 115)">
      <circle r="52" fill="#141414"/>
      <g fill="none" stroke="#3d3a38" stroke-width="1.6"><circle r="44"/><circle r="36"/><circle r="28"/></g>
      <path d="M -30 -34 A 46 46 0 0 1 34 -30" fill="none" stroke="#fff" stroke-opacity="0.16" stroke-width="4" stroke-linecap="round"/>
      <circle r="17" fill="#f0a831"/><circle r="4" fill="#141414"/>
    </g>
  </g>
  <rect x="159" y="190" width="104" height="12" rx="6" fill="#2a2a2a"/>
  <rect x="159" y="210" width="66"  height="10" rx="5" fill="#b3aca2"/>
</svg>
