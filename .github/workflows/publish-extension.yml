name: Publish extension to Chrome Web Store

# Publishes the "Broken Record" extension on a deliberate version tag. Pushing
# `v1.3.0` builds the extension, stamps 1.3.0 into the packaged manifest, uploads
# it via the Chrome Web Store API, and lets it auto-publish once Google's review
# passes -- no manual repackage, no dashboard upload, no manual version edit.
#
# A manual "Run workflow" (workflow_dispatch) uploads as a DRAFT only -- a safe
# dry-run of build + packaging + credentials with no real release. Enable that
# before trusting the first real tag.
#
# ONE-TIME SETUP before the first publish (full checklist in the spec,
# mwatt123/daily-music#31):
#   1. Google Cloud: enable the Chrome Web Store API, configure the OAuth consent
#      screen, create a Desktop-app OAuth client (-> client id + secret).
#   2. Set the consent screen to "In production" -- otherwise the sensitive
#      chromewebstore scope expires refresh tokens after 7 days and CI breaks.
#   3. Generate a refresh token once: `npx chrome-webstore-upload-keys`.
#   4. Add five repository secrets (never commit these):
#      CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN,
#      CWS_EXTENSION_ID (item id), CWS_PUBLISHER_ID.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to dry-run as a draft, e.g. v1.3.0 (need not be a real tag)"
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build:extension
      - name: Stamp version from tag (guards a strict increment)
        run: npm run extension:stamp-version -- "$TAG"
        env:
          TAG: ${{ github.event.inputs.version || github.ref_name }}
      - name: Package dist-extension as a clean zip
        # -X drops extra file attributes; -x excludes .DS_Store at any depth, so
        # manifest.json lands at the archive root with no macOS cruft.
        run: cd dist-extension && zip -r -X ../broken-record.zip . -x "*.DS_Store"
      - name: Upload to Chrome Web Store
        # On a tag push: --auto-publish (goes live after review). On a manual run:
        # no flag, leaving a draft for a dry-run of everything but the go-live.
        run: npx chrome-webstore-upload-cli@6 upload --source broken-record.zip $PUBLISH_FLAG
        env:
          PUBLISH_FLAG: ${{ github.event_name == 'push' && '--auto-publish' || '' }}
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
